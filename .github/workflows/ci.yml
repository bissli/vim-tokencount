name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --locked

      - name: Smoke test
        run: |
          printf '1 %s\n' "$(printf 'hello world' | base64 | tr -d '\n')" \
            | target/release/tokencount

      - name: Cargo tests
        run: cargo test --release --locked

      - name: Install vim
        uses: rhysd/action-setup-vim@v1
        with:
          version: stable

      - name: Vim tests
        run: test/run.sh
