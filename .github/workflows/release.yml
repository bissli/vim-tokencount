name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tokencount-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: tokencount-linux-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: tokencount-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset: tokencount-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install oniguruma (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libonig-dev

      - name: Install oniguruma (macOS)
        if: runner.os == 'macOS'
        run: brew install oniguruma

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tokencount dist/${{ matrix.asset }}
          (cd dist && shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256)

      - name: Smoke test
        run: |
          printf '1 %s\n' "$(printf 'hello world' | base64 | tr -d '\n')" \
            | dist/${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
